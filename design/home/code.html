</div>

                    역대 모든 월드컵 대회의 영광과 기록을 탐색하세요.<br/>
                    궁금한 국가의 이름을 입력하여 역대 성적을 확인해보세요.
                </p>
</div>
<!-- Search Input Section -->
<div class="w-full mt-8">
<div class="relative flex flex-col md:flex-row items-stretch gap-4 p-2 bg-surface-container-high rounded-xl border border-outline-variant shadow-2xl bento-glow transition-all focus-within:border-primary-container">

</div>
<button class="bg-primary-container text-white px-8 py-4 rounded-lg font-bold uppercase hover:brightness-110 active:scale-95 transition-all shadow-lg flex items-center justify-center gap-2">
<span>검색</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</div>
</div>

<script>
        // Micro-interaction for search input glow
        const searchInput = document.querySelector('input');
        const searchContainer = searchInput?.closest('.shadow-2xl');
        
        if (searchInput && searchContainer) {
            searchInput.addEventListener('focus', () => {
                searchContainer.classList.add('ring-2', 'ring-primary-container/50');
            });
            searchInput.addEventListener('blur', () => {
                searchContainer.classList.remove('ring-2', 'ring-primary-container/50');
            });
        }
    </script>
